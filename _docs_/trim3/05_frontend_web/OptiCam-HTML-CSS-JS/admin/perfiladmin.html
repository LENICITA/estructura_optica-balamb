<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Óptica Balamb</title>
        <link rel="stylesheet" href="CSS/perfiladmin.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <!-- HEADER -->
        <header class="header">
        <div class="left">
            <a href="principaladmin.html" class="logo">
                <img src="../img/logo 2.jpeg" alt="Óptica Balamb">
            </a>
            <div class="left-icons">
                <button id="btn-menu" class="menu-btn"><i class="fa-solid fa-bars"></i></button>
                <form class="lupa">
                    <button type="button" id="search-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" id="search-input" placeholder="Buscar...">
                </form>
            </div>
        </div>
        <nav class="menu">
            <a href="inventario.html" class="active">Inventario</a>
            <a href="controlrepartidores.html">Repartidores</a>
            <a href="reportes.html">Reportes</a>
            <a href="adminPedidos.html">Pedidos</a>
        </nav>
        <div class="icons">
            <button id="btn-mensajes"><i class="fa-regular fa-envelope" ></i></button>
            <button onclick="window.location.href=`perfiladmin.html`"><i class="fa-solid fa-circle-user"  ></i></button>
        </div>
    </header>

        <!-- PERFIL -->
<div class="container">

    <h2>GESTIÓN DE PERFIL ADMINISTRADOR</h2>

    <div class="profile-box">

        <!-- FOTO -->
        <div class="avatar-container">
            <img id="preview" src="https://via.placeholder.com/100" alt="Foto">
            <input type="file" id="foto" accept="image/*" hidden>
            <button onclick="subirFoto()">📷</button>
        </div>

        <!-- FORM -->
        <form id="perfil-form">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" value="LENNY TABAREZ" disabled>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion" disabled>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" disabled>
            </div>

            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="correo" disabled>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" id="telefono" disabled>
            </div>

            <button type="button" class="btn primary" onclick="activarEdicion()">EDITAR PERFIL</button>
            <button type="button" class="btn guardar" onclick="guardar()">GUARDAR</button>

        </form>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">

    <div class="footer-section">
        <h3>Contacto</h3>
        <p>opticavirtualbalamb@gmail.com</p>
        <p>+57 300 237 4767</p>
    </div>

    <div class="footer-section">
        <h3>Tienda</h3>
        <p>Acerca de</p>
        <p>Catálogo</p>
    </div>

</footer>

<div class="panel-mensajes" id="panel-mensajes">
    <div class="panel-header">
        <h4><i class="fa-solid fa-bell"></i> Notificaciones</h4>
        <button id="cerrar-mensajes" class="cerrar-panel" onclick="document.getElementById('panel-mensajes').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="mensajes-lista" class="mensajes-lista">
        <!-- Los mensajes se cargan con JavaScript -->
    </div>
</div>

<div class="menu-hamburguesa" id="menu"></div>

<script src="../all/js/lupa.js"></script>
<script src="../all/js/hamburguesa.js"></script>
<script src="js/perfil.js"></script>

</body>
</html>
