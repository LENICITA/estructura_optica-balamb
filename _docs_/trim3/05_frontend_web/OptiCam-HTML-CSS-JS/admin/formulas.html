<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Óptica Balamb</title>
        <link rel="stylesheet" href="CSS/formulas.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <!-- HEADER -->
        <header class="header">
            <div class="left">

                <a href="principaladmin.html" class="logo">
                    <img src="../img/logo 2.jpeg" alt="Óptica Balamb">
                </a>

                <div class="left-icons">
                    <button id="btn-menu" class="menu-btn">
        <i class="fas fa-bars"></i>
    </button>
                    <form id="search-form">
                        <button type="button" id="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                        <input type="text" id="search-input" placeholder="Buscar...">
                    </form>
                </div>
            </div>

            <nav class="menu">
                <a href="inventario.html" class="active">Inventario</a>
                <a href="controlrepartidores.html">Repartidores</a>
                <a href="reportes.html">Reportes</a>
                <a href="adminPedidos.html">Pedidos</a>
            </nav>

            <div class="icons">
                <button id="btn-mensajes"><i class="fa-regular fa-envelope"></i></button>
                <button onclick="window.location.href='perfiladmin.html'">
        <i class="fa-solid fa-circle-user"></i></button>
            </div>
        </header>

        <main class="admin-main">

    <!-- HEADER -->
    <section class="top-formulas">
        <h1>Gestión de Fórmulas</h1>
    </section>

    <section class="contenedor-formulas">

        <!-- LISTA -->
        <div class="lista-formulas">
            <h2>Fórmulas recibidas</h2>

            <table id="tablaFormulas">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Condición</th>
                        <th>Observación</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody id="tablaBody">
            
                </tbody>
            </table>
        </div>

        <!-- DETALLE -->
        <div class="detalle-formula">

            <h2>Detalle de fórmula</h2>

            <img id="img-formula" src="img/default.jpg" class="img-grande">

            <p><strong>Condición:</strong> <span id="condicion"></span></p>
            <p><strong>Observación:</strong> <span id="observacion"></span></p>
            <p><strong>Fecha:</strong> <span id="fecha"></span></p>

            <!-- PRECIO -->
            <label>Asignar precio:</label>
            <form id="precioForm">
                <input type="number" id="precio" placeholder="Ej: 120000" required>
                <button type="submit" class="btn-enviar" id="btnEnviarPrecio">Enviar precio</button>
            </form>

        </div>

    </section>

</main>

<footer class="footer">

            <div class="footer-section">
                <h3>Contacto</h3>
                    <p>opticavirtualbalamb@gmail.com</p>
                    <p>+57 300 237 4767</p>
            </div>

            <div class="footer-section">
                <h3>Tienda</h3>
                    <p>Acerca de</p>
                    <p>Catálogo</p>
            </div>

        </footer>

        <div class="panel-mensajes" id="panel-mensajes">
    <div class="panel-header">
        <h4><i class="fa-solid fa-bell"></i> Notificaciones</h4>
        <button id="cerrar-mensajes" class="cerrar-panel" onclick="document.getElementById('panel-mensajes').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="mensajes-lista" class="mensajes-lista">
        <!-- Los mensajes se cargan con JavaScript -->
    </div>
</div>


        <div class="menu-hamburguesa" id="menu"></div>

        <script src="js/app.js"></script>
        <script src="js/hamburguesa.js"></script>
        <script src="js/formulas.js"></script>

    </body>
</html>
