<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Óptica Balamb</title>
        <link rel="stylesheet" href="css/controlrepartidores.css">
        <script src="https://kit.fontawesome.com/TU_CODIGO.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <!-- HEADER -->
        <header class="header">
            <div class="left">

                <a href="principaladmin.html" class="logo">
                    <img src="../img/logo 2.jpeg" alt="Óptica Balamb">
                </a>

                <div class="left-icons">
                    <button id="btn-menu" class="menu-btn">
        <i class="fas fa-bars"></i>
    </button>
                    <form id="search-form">
                        <button type="button" id="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                        <input type="text" id="search-input" placeholder="Buscar...">
                    </form>
                </div>
            </div>

            <nav class="menu">
                <a href="inventario.html" class="active">Inventario</a>
                <a href="controlrepartidores.html">Repartidores</a>
                <a href="reportes.html">Reportes</a>
                <a href="adminPedidos.html">Pedidos</a>
            </nav>

            <div class="icons">
                <button id="btn-mensajes"><i class="fa-regular fa-envelope"></i></button>
                <button onclick="window.location.href='perfiladmin.html'">
        <i class="fa-solid fa-circle-user"></i></button>
            </div>
        </header>

       <main class="admin-main">

    <!-- HEADER DE SECCIÓN -->
    <section class="top-repartidores">
        <h1>Gestión de Repartidores</h1>
        <button type="button" class="btn-registrar"><a href="registrore.html">
            <i class="fa-solid fa-user-plus"></i> Registrar repartidor
        </a></button>
    </section>

    <!-- CONTENIDO -->
    <section class="contenedor-repartidores">

        <!-- LISTA -->
        <div class="lista">
            <h2>Repartidores</h2>

            <table id="tablaRepartidores">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Estado</th>
                    </tr>
                </thead>

                <tbody id="tablaBody">
                    
                </tbody>
            </table>
        </div>

        <!-- DETALLE -->
        <div class="detalle" id="detalle">

            <h2>Detalle del repartidor</h2>

            <p><strong>Nombre:</strong> <span id="detalleNombre"></span></p>
            <p><strong>Pedidos entregados:</strong> <span id="detallePedidos"></span></p>

            <p><strong>Estado actual:</strong> 
                <span id="detalleEstado"></span>
            </p>

            <!-- CAMBIAR ESTADO -->
            <label>Cambiar estado:</label>
            <select id="estadoSelect">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
                <option value="Suspendido">Suspendido</option>
            </select>

            <button class="btn-guardar" id="btnGuardarEstado">Guardar cambios</button>

        </div>

    </section>

</main>

<footer class="footer">

            <div class="footer-section">
                <h3>Contacto</h3>
                    <p>opticavirtualbalamb@gmail.com</p>
                    <p>+57 300 237 4767</p>
            </div>

            <div class="footer-section">
                <h3>Tienda</h3>
                    <p>Acerca de</p>
                    <p>Catálogo</p>
            </div>

        </footer>

        <div class="panel-mensajes" id="panel-mensajes">
    <div class="panel-header">
        <h4><i class="fa-solid fa-bell"></i> Notificaciones</h4>
        <button id="cerrar-mensajes" class="cerrar-panel" onclick="document.getElementById('panel-mensajes').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="mensajes-lista" class="mensajes-lista">
        <!-- Los mensajes se cargan con JavaScript -->
    </div>
</div>

        <div class="menu-hamburguesa" id="menu"></div>

        <script src="../all/js/lupa.js"></script>
        <script src="../all/js/hamburguesa.js"></script>
        <script src="js/controlrepartidores.js"></script>

    </body>
</html>
